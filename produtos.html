<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Produtos — Bazar Emicida</title>
  <meta name="description" content="Todos os itens do Bazar Emicida. Filtre por categoria e negocie direto no WhatsApp.">
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
<div class="page-header">
  <div class="container">
    <div style="display:flex;align-items:flex-start;justify-content:space-between;gap:16px;flex-wrap:wrap">
      <nav class="breadcrumb" id="breadcrumb">
        <a href="index.html">Home</a><span>&rsaquo;</span>
        <a href="categorias.html">Categorias</a><span>&rsaquo;</span>
        <span id="bcCat">Todos os produtos</span>
      </nav>
      <div style="display:flex;gap:8px;flex-shrink:0">
        <a id="btnShareWpp" href="#" target="_blank" rel="noopener" class="share-btn wpp" style="padding:8px 14px;font-size:0.8rem">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="currentColor"><path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51-.173-.008-.371-.01-.57-.01-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347m-5.421 7.403h-.004a9.87 9.87 0 01-5.031-1.378l-.361-.214-3.741.982.998-3.648-.235-.374a9.86 9.86 0 01-1.51-5.26c.001-5.45 4.436-9.884 9.888-9.884 2.64 0 5.122 1.03 6.988 2.898a9.825 9.825 0 012.893 6.994c-.003 5.45-4.437 9.884-9.885 9.884m8.413-18.297A11.815 11.815 0 0012.05 0C5.495 0 .16 5.335.157 11.892c0 2.096.547 4.142 1.588 5.945L.057 24l6.305-1.654a11.882 11.882 0 005.683 1.448h.005c6.554 0 11.89-5.335 11.893-11.893a11.821 11.821 0 00-3.48-8.413z"/></svg>
          <span>WhatsApp</span>
        </a>
        <button id="btnShareCopy" class="share-btn copy" style="padding:8px 14px;font-size:0.8rem">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 01-2-2V4a2 2 0 012-2h9a2 2 0 012 2v1"/></svg>
          <span>Copiar link</span>
        </button>
      </div>
    </div>
    <h1 class="sh-title display" id="pageTitle" style="font-size:clamp(2rem,6vw,3.5rem)">Todos os <em style="font-style:normal;color:var(--orange)">produtos</em></h1>
    <p class="sh-sub" id="pageSub" style="margin-top:8px">Clica no card pra ver detalhes e negociar direto no WhatsApp.</p>
  </div>
</div>

<section class="section" style="padding-top:0">
  <div class="container">
    <div class="filtro">
      <input class="filtro-input" id="busca" type="text" placeholder="Buscar produto..." autocomplete="off">
      <div class="filtro-tags" id="filtroTags"></div>
    </div>
    <p class="filtro-count" id="contador"></p>
    <div class="grid-auto" id="lista"></div>
  </div>
</section>

<script src="js/config.js"></script>
<script src="js/data.js"></script>
<script src="js/ui.js"></script>
<script>
  renderNavbar();
  renderFooter();

  const params = new URLSearchParams(window.location.search);
  let catAtiva   = params.get('categoria') || '';
  let buscaAtiva = '';
  let todos      = [];

  // Ajusta título se tem categoria
  if (catAtiva) {
    const cat = CONFIG.CATEGORIAS.find(c => c.id === catAtiva);
    if (cat) {
      document.getElementById('bcCat').textContent = cat.nome;
      document.getElementById('pageTitle').innerHTML =
        `<em style="font-style:normal;color:var(--orange)">${cat.icone}</em> ${cat.nome}`;
      document.getElementById('pageSub').textContent = cat.descricao;
    }
  }

  // Tags de filtro
  const tagsEl = document.getElementById('filtroTags');
  function mkTag(label, id) {
    const b = document.createElement('button');
    b.className = `ftag${catAtiva === id ? ' on' : ''}`;
    b.textContent = label;
    b.dataset.id  = id;
    b.onclick = () => {
      catAtiva = id;
      tagsEl.querySelectorAll('.ftag').forEach(t => t.classList.toggle('on', t.dataset.id === id));
      const url = new URL(window.location);
      id ? url.searchParams.set('categoria', id) : url.searchParams.delete('categoria');
      window.history.replaceState({}, '', url);
      render();
    };
    return b;
  }
  tagsEl.appendChild(mkTag('Todos', ''));
  CONFIG.CATEGORIAS.forEach(c => tagsEl.appendChild(mkTag(c.nome, c.id)));

  // Busca
  document.getElementById('busca').oninput = e => { buscaAtiva = e.target.value.toLowerCase().trim(); render(); };

  function render() {
    const lista = document.getElementById('lista');
    let filtrados = todos;
    if (catAtiva)   filtrados = filtrados.filter(p => p.categoria === catAtiva);
    if (buscaAtiva) filtrados = filtrados.filter(p =>
      p.nome?.toLowerCase().includes(buscaAtiva) || p.descricao?.toLowerCase().includes(buscaAtiva));

    const disp = filtrados.filter(isDisponivel).length;
    document.getElementById('contador').textContent =
      `${filtrados.length} item${filtrados.length !== 1 ? 's' : ''} encontrado${filtrados.length !== 1 ? 's' : ''} — ${disp} disponíve${disp !== 1 ? 'is' : 'l'}`;

    lista.innerHTML = '';
    if (!filtrados.length) { renderVazio(lista, 'Nenhum item com esses filtros.'); return; }

    filtrados.filter(isDisponivel).forEach(p => lista.appendChild(renderCardProduto(p)));
  }

  // Share buttons do topo
  const PAGE_URL = 'https://rabsouza.github.io/bazar_emicida/produtos.html';
  const shareMsg = `🏍️ *Bazar Emicida — Liquidação de Mudança!*\n\nEstou vendendo itens pessoais bem conservados com preço justo: jogos de tabuleiro raros, equipamentos de moto, eletrônicos, móveis e muito mais!\n\n✅ Tudo meu e bem cuidado\n✅ Preço justo e negociável\n✅ Pix, PicPay, PayPal ou cartão\n📍 Retirada em BH/MG\n\n👇 Dá uma olhada e me chama se gostar de algo!\n${PAGE_URL}`;
  document.getElementById('btnShareWpp').href = `https://wa.me/?text=${encodeURIComponent(shareMsg)}`;
  document.getElementById('btnShareCopy').addEventListener('click', function () {
    navigator.clipboard.writeText(PAGE_URL).then(() => {
      const span = this.querySelector('span');
      this.classList.add('copiado'); span.textContent = 'Copiado!';
      let toast = document.getElementById('_toast');
      if (!toast) { toast = document.createElement('div'); toast.className = 'toast'; toast.id = '_toast'; document.body.appendChild(toast); }
      toast.textContent = 'Link copiado — cola no Instagram Stories 🔗';
      toast.classList.add('show');
      setTimeout(() => { toast.classList.remove('show'); this.classList.remove('copiado'); span.textContent = 'Copiar link'; }, 2500);
    });
  });

  const lista = document.getElementById('lista');
  renderLoading(lista);
  fetchProdutos().then(data => {
    todos = data;
    render();

    // Abre modal direto se ?id= estiver na URL
    const idParam = new URLSearchParams(window.location.search).get('id');
    if (idParam) {
      const produto = data.find(p => p.id === idParam);
      if (produto) setTimeout(() => abrirModal(produto), 300);
    }
  });
</script>
</body>
</html>
