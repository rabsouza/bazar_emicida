<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Categorias — Bazar Emicida</title>
  <meta name="description" content="Navegue pelas categorias do Bazar Emicida: Motos, Eletrônicos, Jogos, Móveis, Casa e mais.">
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
<div class="page-header">
  <div class="container">
    <div style="display:flex;align-items:flex-start;justify-content:space-between;gap:16px;flex-wrap:wrap">
      <nav class="breadcrumb">
        <a href="index.html">Home</a><span>&rsaquo;</span><span>Categorias</span>
      </nav>
      <div style="display:flex;gap:8px;flex-shrink:0">
        <a id="btnShareWpp" href="#" target="_blank" rel="noopener" class="share-btn wpp" style="padding:8px 14px;font-size:0.8rem">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="currentColor"><path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51-.173-.008-.371-.01-.57-.01-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347m-5.421 7.403h-.004a9.87 9.87 0 01-5.031-1.378l-.361-.214-3.741.982.998-3.648-.235-.374a9.86 9.86 0 01-1.51-5.26c.001-5.45 4.436-9.884 9.888-9.884 2.64 0 5.122 1.03 6.988 2.898a9.825 9.825 0 012.893 6.994c-.003 5.45-4.437 9.884-9.885 9.884m8.413-18.297A11.815 11.815 0 0012.05 0C5.495 0 .16 5.335.157 11.892c0 2.096.547 4.142 1.588 5.945L.057 24l6.305-1.654a11.882 11.882 0 005.683 1.448h.005c6.554 0 11.89-5.335 11.893-11.893a11.821 11.821 0 00-3.48-8.413z"/></svg>
          <span>WhatsApp</span>
        </a>
        <button id="btnShareCopy" class="share-btn copy" style="padding:8px 14px;font-size:0.8rem">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 01-2-2V4a2 2 0 012-2h9a2 2 0 012 2v1"/></svg>
          <span>Copiar link</span>
        </button>
      </div>
    </div>
    <h1 class="sh-title display" style="font-size:clamp(2rem,6vw,3.5rem);margin-top:16px">O que você está<br><em style="font-style:normal;color:var(--orange)">procurando?</em></h1>
    <p class="sh-sub" style="margin-top:8px">Seleciona a categoria e vai direto nos itens que te interessam.</p>
  </div>
</div>

<section class="section" style="padding-top:0">
  <div class="container">
    <div class="grid-cats" id="listaCats"></div>
  </div>
</section>

<section class="section-sm">
  <div class="container">
    <div class="banner" data-deco="?">
      <div class="banner-center">
        <span class="sh-label label-sm" style="color:var(--orange-txt)">Não achou</span>
        <h2 class="sh-title display" style="margin-top:8px">Fala <em style="font-style:normal;color:var(--orange)">comigo.</em></h2>
        <p>Pode ser que eu tenha algo que ainda não cadastrei. Me manda mensagem que a gente resolve, uai.</p>
        <a href="contato.html" class="btn btn-ghost" style="margin:0 auto">Falar com o admin &rarr;</a>
      </div>
    </div>
  </div>
</section>

<script src="js/config.js"></script>
<script src="js/data.js"></script>
<script src="js/ui.js"></script>
<script>
  renderNavbar();
  renderFooter();

  const PAGE_URL = 'https://rabsouza.github.io/bazar_emicida/categorias.html';

  // WhatsApp
  const msg = `🏍️ *Bazar Emicida — Liquidação de Mudança!*\n\nEstou vendendo itens pessoais bem conservados com preço justo: jogos de tabuleiro raros, equipamentos de moto, eletrônicos, móveis e muito mais!\n\n✅ Tudo meu e bem cuidado\n✅ Preço justo e negociável\n✅ Pix, PicPay, PayPal ou cartão\n📍 Retirada em BH/MG\n\n👇 Dá uma olhada e me chama se gostar de algo!\n${PAGE_URL}`;
  document.getElementById('btnShareWpp').href = `https://wa.me/?text=${encodeURIComponent(msg)}`;

  // Copiar link
  document.getElementById('btnShareCopy').addEventListener('click', function () {
    navigator.clipboard.writeText(PAGE_URL).then(() => {
      const span = this.querySelector('span');
      this.classList.add('copiado');
      span.textContent = 'Copiado!';
      // toast
      let toast = document.getElementById('_toast');
      if (!toast) { toast = document.createElement('div'); toast.className = 'toast'; toast.id = '_toast'; document.body.appendChild(toast); }
      toast.textContent = 'Link copiado — cola no Instagram Stories 🔗';
      toast.classList.add('show');
      setTimeout(() => { toast.classList.remove('show'); this.classList.remove('copiado'); span.textContent = 'Copiar link'; }, 2500);
    });
  });

  const lista = document.getElementById('listaCats');

  fetchProdutos().then(todos => {
    CONFIG.CATEGORIAS.forEach(cat => {
      const total = todos.filter(p => p.categoria === cat.id).length;
      const disp  = todos.filter(p => p.categoria === cat.id && isDisponivel(p)).length;

      const a = document.createElement('a');
      a.href = `produtos.html?categoria=${cat.id}`;
      a.className = 'card-cat';
      a.innerHTML = `
        <span class="card-cat-icon">${cat.icone}</span>
        <span class="card-cat-name display">${cat.nome}</span>
        <p class="card-cat-desc">${cat.descricao}</p>
        <div class="card-cat-footer">
          <span class="card-cat-count">${total} item${total !== 1 ? 's' : ''} &mdash; ${disp} disponíve${disp !== 1 ? 'is' : 'l'}</span>
          <span class="card-cat-arrow">&#8594;</span>
        </div>
      `;
      lista.appendChild(a);
    });
  });
</script>
</body>
</html>
